services:
  # Backend API
  - type: web
    name: ai-code-review-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-code-review-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: ai-code-review-redis
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_REDIRECT_URI
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10080"

  # Frontend Static Site
  - type: static
    name: ai-code-review-frontend
    staticPublishPath: ./frontend
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache

  # Managed Redis Instance
  - type: keyvalue
    name: ai-code-review-redis
    plan: free

databases:
  - name: ai-code-review-db
    plan: free
