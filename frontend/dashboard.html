<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - AI Code Review</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">AI Code Review</div>
        <div class="nav-right">
            <span id="username-display"></span>
            <button class="btn-secondary" onclick="logout()">Logout</button>
        </div>
    </nav>
    <main class="dashboard-container">
        <div class="dashboard-header">
            <h2>Your Dashboard</h2>
            <button class="btn-primary" onclick="window.location.href='review.html'">New Review</button>
        </div>
        <div class="stats-grid">
            <div class="stat-card">
                <h4>Total Reviews</h4>
                <div id="stat-total" class="stat-value">-</div>
            </div>
            <div class="stat-card">
                <h4>Avg Score</h4>
                <div id="stat-avg" class="stat-value">-</div>
            </div>
            <div class="stat-card">
                <h4>Best Score</h4>
                <div id="stat-best" class="stat-value">-</div>
            </div>
            <div class="stat-card">
                <h4>Top Language</h4>
                <div id="stat-lang" class="stat-value">-</div>
            </div>
        </div>
        
        <div class="reviews-section">
            <h3>Recent Reviews</h3>
            <table class="reviews-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Language</th>
                        <th>Score</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="reviews-tbody">
                </tbody>
            </table>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const tokenFromUrl = urlParams.get('token');
        if (tokenFromUrl) {
            setToken(tokenFromUrl);
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        redirectIfNoAuth();
        
        async function loadDashboard() {
            const user = await fetchCurrentUser();
            if (user) {
                document.getElementById('username-display').innerText = user.username;
            }

            const token = getToken();
            
            try {
                const res = await fetch(`${CONFIG.API_BASE_URL}/api/analytics/summary`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('stat-total').innerText = data.total_reviews;
                    document.getElementById('stat-avg').innerText = data.avg_score;
                    document.getElementById('stat-best').innerText = data.best_score;
                    
                    const langs = Object.entries(data.languages);
                    if (langs.length > 0) {
                        langs.sort((a, b) => b[1] - a[1]);
                        document.getElementById('stat-lang').innerText = langs[0][0];
                    } else {
                        document.getElementById('stat-lang').innerText = "N/A";
                    }
                }
            } catch (e) {
                console.error("Error fetching analytics", e);
            }

            try {
                const res = await fetch(`${CONFIG.API_BASE_URL}/api/reviews`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    const reviews = await res.json();
                    const tbody = document.getElementById('reviews-tbody');
                    tbody.innerHTML = '';
                    reviews.forEach(r => {
                        const tr = document.createElement('tr');
                        const date = new Date(r.created_at).toLocaleDateString();
                        const scoreClass = r.score >= 80 ? 'score-good' : (r.score >= 60 ? 'score-ok' : 'score-bad');
                        tr.innerHTML = `
                            <td>${date}</td>
                            <td>${r.language}</td>
                            <td><span class="score-badge ${scoreClass}">${r.score}</span></td>
                            <td>
                                <button class="btn-sm btn-danger" onclick="deleteReview(${r.id})">Delete</button>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                }
            } catch (e) {
                console.error("Error fetching reviews", e);
            }
        }

        async function deleteReview(id) {
            if (!confirm('Are you sure you want to delete this review?')) return;
            const res = await fetch(`${CONFIG.API_BASE_URL}/api/reviews/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${getToken()}` }
            });
            if (res.ok) {
                loadDashboard();
            } else {
                alert('Failed to delete review');
            }
        }

        loadDashboard();
    </script>
</body>
</html>
